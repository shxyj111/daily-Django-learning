<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!-- 1.引入vue.js文件 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
    <!-- 引入 vue-router -->
    <script src="https://cdn.jsdelivr.net/npm/vue-router@3/dist/vue-router.js"></script>
    <style>
        .router-nav { margin-bottom: 16px; }
        .router-nav a { margin-right: 12px; }
        .router-link-active { color: red; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <h1>欢迎学习Vue.js</h1>
    <div>我叫{{name}}，微信{{wechat}}</div>

    <hr>

    <!-- ====== v-on 知识点 ====== -->
    <h2>v-on 指令</h2>
    <input type="button" value="点我（完整写法）" v-on:click="clickMe">
    <input type="button" value="点我（简写 @click）" @click="clickMe">
    <div @mouseenter="showHint" @mouseleave="hideHint" style="display:inline-block;padding:10px;background:#eee;">
        鼠标移入试试
    </div>
    <span>{{hint}}</span>

    <hr>

    <!-- ====== v-bind 知识点 ====== -->
    <h2>v-bind 指令</h2>
    <div v-bind:title="tipText">鼠标悬停看我（完整写法）</div>
    <div :title="tipText">鼠标悬停看我（简写 :title）</div>
    <a :href="linkUrl">点我跳转</a>

    <hr>

    <!-- ====== v-model 知识点 ====== -->
    <h2>v-model 指令</h2>
    <input type="text" v-model="message" placeholder="输入内容试试">
    <div>你输入的是：{{message}}</div>

    <hr>

    <!-- ====== v-for 知识点 ====== -->
    <h2>v-for 指令</h2>
    <ul>
        <li v-for="item in users">姓名：{{item.name}}，年龄：{{item.age}}</li>
    </ul>

    <hr>

    <!-- ====== v-if 知识点 ====== -->
    <h2>v-if 指令</h2>
    <input type="button" value="切换显示" @click="isShow = !isShow">
    <div v-if="isShow">v-if：条件为 true 时显示</div>
    <div v-else>v-else：条件为 false 时显示</div>
    <div v-if="score >= 90">优秀</div>
    <div v-else-if="score >= 60">及格</div>
    <div v-else>不及格</div>
    <div>当前分数：{{score}}</div>

    <hr>

    <!-- ====== v-show 知识点 ====== -->
    <h2>v-show 指令</h2>
    <input type="button" value="切换显示" @click="isVisible = !isVisible">
    <div v-show="isVisible">你看得见我</div>

    <hr>

    <!-- ====== vue-router 知识点 ====== -->
    <!-- vue-router 实现前端路由，不同 URL 显示不同组件，页面不刷新 -->
    <h2>vue-router</h2>

    <!-- router-link 就是导航链接，to 指向路由路径 -->
    <div class="router-nav">
        <router-link to="/home">首页</router-link>
        <router-link to="/about">关于</router-link>
    </div>

    <!-- router-view 是路由匹配到的组件渲染的位置 -->
    <router-view></router-view>
</div>

<script>
    // ===== 定义路由对应的组件（就是页面片段） =====
    var Home = { template: '<div><h3>这是首页</h3><p>欢迎来到首页内容</p></div>' };
    var About = { template: '<div><h3>这是关于页</h3><p>这是关于页面的内容</p></div>' };

    // ===== 定义路由规则：路径 -> 组件 =====
    var router = new VueRouter({
        routes: [
            { path: '/home', component: Home },
            { path: '/about', component: About }
        ]
    });

    // 3.创建Vue对象，关联路由
    var app = new Vue({
        el: '#app',
        router: router,  // 把路由注入 Vue 实例
        data: {
            name: '武沛齐',
            wechat: 'wupeiqi888',
            tipText: '我是动态绑定的提示',
            linkUrl: 'https://www.baidu.com',
            message: '',
            users: [
                { name: '张三', age: 25 },
                { name: '李四', age: 30 },
                { name: '王五', age: 28 }
            ],
            hint: '',
            isShow: true,
            score: 85,
            isVisible: true
        },
        methods: {
            clickMe: function () {
                this.name = "alex";
                this.wechat = "wupeiqi666";
            },
            showHint: function () {
                this.hint = '鼠标进来了';
            },
            hideHint: function () {
                this.hint = '鼠标出去了';
            }
        }
    })
</script>
</body>
</html>
