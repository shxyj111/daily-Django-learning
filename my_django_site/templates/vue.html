<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <!-- 1.引入vue.js文件 -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2/dist/vue.js"></script>
</head>
<body>

<!-- 2.指定区域，该区域的内容由vue.js来接管 -->
<div id="app">
    <h1>欢迎学习Vue.js</h1>
    <div>我叫{{name}}，微信{{wechat}}</div>
    <input type="button" value="点我" v-on:click="clickMe">

    <hr>

    <!-- ====== v-bind 知识点 ====== -->
    <!-- v-bind 用于动态绑定 HTML 属性，简写为一个冒号 : -->
    <h2>v-bind 指令</h2>

    <!-- 绑定 title：鼠标悬停显示 -->
    <div v-bind:title="tipText">鼠标悬停看我（完整写法）</div>

    <!-- 简写形式，效果一样 -->
    <div :title="tipText">鼠标悬停看我（简写 :title）</div>

    <!-- 绑定 href -->
    <a :href="linkUrl">点我跳转</a>

    <hr>

    <!-- ====== v-model 知识点 ====== -->
    <!-- v-model 实现表单元素和数据之间的双向绑定 -->
    <h2>v-model 指令</h2>

    <!-- 输入框：输入什么，下面立刻显示什么 -->
    <input type="text" v-model="message" placeholder="输入内容试试">
    <div>你输入的是：{{message}}</div>
</div>

<script>
    // 3.创建Vue对象，并关联指定的HTML区域
    var app = new Vue({
        el: '#app',
        data: {
            name: '武沛齐',
            wechat: 'wupeiqi888',
            tipText: '我是动态绑定的提示',
            linkUrl: 'https://www.baidu.com',
            message: ''
        },
        methods: {
            clickMe: function () {
                // 获取值：this.name
                // 修改值：this.name = "新值"
                this.name = "alex";
                this.wechat = "wupeiqi666";
            }
        }
    })
</script>
</body>
</html>
